name: Build release executable

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-windows-exe:
    name: Publish Windows exe
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish desktop app
        run: >
          dotnet publish src/ResolutionSwitcher.Desktop/ResolutionSwitcher.Desktop.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -o artifacts/publish

      - name: Upload executable to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "artifacts/publish/ResolutionSwitcher.Desktop.exe" --clobber
